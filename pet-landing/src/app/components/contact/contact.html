<section id="contacto" class="contact">
  <div class="contact-card">
    <h2>Formulario de contacto</h2>
    <p class="subtitle">Completa tus datos para enviarte una propuesta personalizada.</p>
    <form (ngSubmit)="onSubmit()" #contactForm="ngForm">
      <div class="grid two-cols">
        <div>
          <label for="name">Nombre</label>
          <input id="name" name="name" type="text" [(ngModel)]="name" required />
        </div>
        <div>
          <label for="lastname">Apellido</label>
          <input id="lastname" name="lastname" type="text" [(ngModel)]="lastname" required />
        </div>
      </div>

      <div class="grid two-cols">
        <div>
          <label for="email">Correo</label>
          <input id="email" name="email" type="email" [(ngModel)]="email" required />
        </div>
        <div>
          <label for="phone">Telefono</label>
          <input id="phone" name="phone" type="tel" [(ngModel)]="phone" required />
        </div>
      </div>

      <div class="grid two-cols">
        <div>
          <label for="petType">Tipo de mascota</label>
          <input id="petType" name="petType" type="text" [(ngModel)]="petType" required />
        </div>
        <div>
          <label for="service">Servicio</label>
          <select id="service" name="service" [(ngModel)]="service" required>
            <option value="">Selecciona una opcion</option>
            <option value="Consulta veterinaria">Consulta veterinaria</option>
            <option value="Grooming premium">Grooming premium</option>
            <option value="Entrenamiento y paseo">Entrenamiento y paseo</option>
            <option value="Hotel de dia">Hotel de dia</option>
          </select>
        </div>
      </div>

      <label for="details">Cuidados o comentarios</label>
      <textarea
        id="details"
        name="details"
        rows="4"
        [(ngModel)]="details"
        placeholder="Ejemplo: mi perrito tiene piel sensible y necesita productos hipoalergenicos."
      ></textarea>

      <label class="terms-check">
        <input type="checkbox" name="acceptTerms" [(ngModel)]="acceptTerms" required />
        Acepto ser contactado para recibir informacion del servicio.
      </label>

      <button type="submit" [disabled]="contactForm.invalid">Enviar solicitud</button>
    </form>
  </div>

  @if (sentMessage) {
    <p class="success-message">{{ sentMessage }}</p>
  }
</section>
