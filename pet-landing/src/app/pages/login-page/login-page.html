<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo y título -->
    <div class="login-header">
      <span class="login-logo">🐾</span>
      <h1>PetCare+</h1>
      <p>Inicia sesión para continuar</p>
    </div>

    <!-- Mensaje de error global -->
    <div class="alert-error" *ngIf="errorMsg" role="alert">
      ⚠️ {{ errorMsg }}
    </div>

    <!-- Formulario Reactivo -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <!-- Email -->
      <div class="field-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="ejemplo@correo.com"
          autocomplete="email"
          [class.input-error]="f['email'].invalid && f['email'].touched"
          [class.input-valid]="f['email'].valid && f['email'].touched">

        <!-- Mensajes de error — se muestran solo al tocar el campo -->
        <div class="error-msgs" *ngIf="f['email'].invalid && f['email'].touched">
          <span *ngIf="f['email'].errors?.['required']">
            El correo es obligatorio.
          </span>
          <span *ngIf="f['email'].errors?.['email']">
            El formato del correo no es válido.
          </span>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="field-group">
        <label for="password">Contraseña</label>
        <div class="pass-wrapper">
          <input
            id="password"
            [type]="mostrarPass ? 'text' : 'password'"
            formControlName="password"
            placeholder="Mínimo 6 caracteres"
            autocomplete="current-password"
            [class.input-error]="f['password'].invalid && f['password'].touched"
            [class.input-valid]="f['password'].valid && f['password'].touched">
          <button type="button" class="btn-toggle-pass" (click)="togglePass()"
            [attr.aria-label]="mostrarPass ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            {{ mostrarPass ? '🙈' : '👁️' }}
          </button>
        </div>

        <div class="error-msgs" *ngIf="f['password'].invalid && f['password'].touched">
          <span *ngIf="f['password'].errors?.['required']">
            La contraseña es obligatoria.
          </span>
          <span *ngIf="f['password'].errors?.['minlength']">
            La contraseña debe tener al menos 6 caracteres.
          </span>
        </div>
      </div>

      <!-- Botón submit -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="cargando">
        <span *ngIf="!cargando">Iniciar Sesión</span>
        <span *ngIf="cargando" class="spinner">⏳ Verificando...</span>
      </button>

    </form>

    <!-- Credenciales de demo -->
    <div class="demo-box">
      <p>Credenciales de prueba:</p>
      <code>admin&#64;petcare.com / 123456</code>
      <button type="button" class="btn-demo" (click)="usarDemo()">
        Usar credenciales demo
      </button>
    </div>

  </div>
</div>
